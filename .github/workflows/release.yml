name: Heltec Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: heltec-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip unzip xz-utils

      - name: Install Python dependencies
        run: pip install packaging pyserial

      - name: Build release assets
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bash ./.github/scripts/on-release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ github.workspace }}/build
          if-no-files-found: error

  test-package:
    name: Test package
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pyserial
        run: pip install pyserial

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ${{ github.workspace }}/build

      - name: Test package installation
        run: bash ./.github/scripts/test-package-json.sh

  upload-release-assets:
    name: Upload assets to release
    needs: [build, test-package]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ${{ github.workspace }}/build

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$GITHUB_WORKSPACE/build/heltec-esp32-core-$RELEASE_TAG.zip" \
            "$GITHUB_WORKSPACE/build/package_heltec_esp32_index.json" \
            --clobber